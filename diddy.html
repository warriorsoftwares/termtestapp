<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"><link rel="canonical" href="https://warriorsoftwares.github.io/termtestapp/diddy.html" />
 
    <title>Dhamma School Term Tests</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .screen {
            display: none;
            position: fixed;
            inset: 0;
            background: #40fff5;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.4s ease-in-out;
            z-index: 4000;
            overflow-y: auto;
            padding: 20px 0;
        }
        .screen.active { display: flex; opacity: 1; }

        /* Grade Selection Grid */
        .grade-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 90%;
            max-width: 320px;
            margin: 20px auto;
            justify-items: center;
        }

        /* Term Selection Spacing */
        .term-container {
            display: flex;
            flex-direction: column;
            gap: 25px; 
            width: 100%;
            align-items: center;
            margin-top: 40px;
        }

        .btn-menu { margin: 0 !important; }

        /* Centered Grade 11 button spanning 2 columns */
        .btn-grade-11 {
            grid-column: span 2;
            width: 295px !important;
        }

        /* Stats Bar Styling */
        .stats-bar {
            width: 85%;
            display: flex;
            justify-content: space-between;
            font-weight: 900;
            font-size: 18px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <!-- 1. GRADE SELECTION SCREEN -->
    <div id="dhamma-screen" class="screen active">
        <div class="top-nav">
            <button class="btn-nav-icon" onclick="window.location.href='index.html?screen=mode-screen'">⬅️</button>
        </div>
        <h1 class="q-header-title no-shadow-title">Dhamma School Grades</h1>
        <div class="grade-grid">
            <button class="btn-menu no-shadow-btn" style="width:140px;" onclick="selectGrade('Grade 1')">Grade 1</button>
            <button class="btn-menu no-shadow-btn" style="width:140px;" onclick="selectGrade('Grade 2')">Grade 2</button>
            <button class="btn-menu no-shadow-btn" style="width:140px;" onclick="selectGrade('Grade 3')">Grade 3</button>
            <button class="btn-menu no-shadow-btn" style="width:140px;" onclick="selectGrade('Grade 4')">Grade 4</button>
            <button class="btn-menu no-shadow-btn" style="width:140px;" onclick="selectGrade('Grade 5')">Grade 5</button>
            <button class="btn-menu no-shadow-btn" style="width:140px;" onclick="selectGrade('Grade 6')">Grade 6</button>
            <button class="btn-menu no-shadow-btn" style="width:140px;" onclick="selectGrade('Grade 7')">Grade 7</button>
            <button class="btn-menu no-shadow-btn" style="width:140px;" onclick="selectGrade('Grade 8')">Grade 8</button>
            <button class="btn-menu no-shadow-btn" style="width:140px;" onclick="selectGrade('Grade 9')">Grade 9</button>
            <button class="btn-menu no-shadow-btn" style="width:140px;" onclick="selectGrade('Grade 10')">Grade 10</button>
            <button class="btn-menu no-shadow-btn btn-grade-11" onclick="selectGrade('Grade 11')">Grade 11</button>
        </div>
    </div>

    <!-- 2. TERM SELECTION SCREEN -->
    <div id="term-screen" class="screen">
        <div class="top-nav"><button class="btn-nav-icon" onclick="showScreen('dhamma-screen')">⬅️</button></div>
        <h1 class="q-header-title no-shadow-title">Select Term</h1>
        <div class="term-container">
            <button class="btn-menu no-shadow-btn" onclick="startQuiz('1st Term')">1. First Term</button>
            <button class="btn-menu no-shadow-btn" onclick="startQuiz('2nd Term')">2. Second Term</button>
            <button class="btn-menu no-shadow-btn" onclick="startQuiz('3rd Term')">3. Third Term</button>
        </div>
    </div>

    <!-- 3. QUIZ CONTAINER -->
    <div id="quiz-container" class="screen">
        <div class="top-nav"><button class="btn-nav-icon" onclick="handleBack()">⬅️</button></div>
        <h1 class="q-header-title" id="active-title" style="text-decoration: double underline #FF1493; text-underline-offset: 10px;">Dhamma Quiz</h1>
        <div class="stats-bar">
            <!-- Timer fixed to Royal Blue -->
            <div id="timer-box" style="color: #1c15ff; font-weight: 900;">Time: 10s</div>
            <div>Score: <span id="live-score">0%</span></div>
        </div>
        <div class="q-row">
            <div class="q-circle" id="q-idx">1</div>
            <div class="q-box" id="q-text">ප්‍රශ්නය පූරණය වේ...</div>
        </div>
        <div id="options-area" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
            <label class="opt-row"><input type="radio" name="opt" id="o0"><span class="yasiru" id="t0"></span></label>
            <label class="opt-row"><input type="radio" name="opt" id="o1"><span class="yasiru" id="t1"></span></label>
            <label class="opt-row"><input type="radio" name="opt" id="o2"><span class="yasiru" id="t2"></span></label>
            <label class="opt-row"><input type="radio" name="opt" id="o3"><span class="yasiru" id="t3"></span></label>
        </div>
        <p id="feedback" style="font-weight:900;"></p>
        <button class="btn-submit" id="main-submit" onclick="checkAnswer()">Submit</button>
    </div>

    <!-- 4. RESULT SCREEN -->
    <div id="result-screen" class="screen">
        <h1 class="q-header-title" style="font-size: 40px; text-decoration: 4px double underline #FF1493; margin: 14px; text-underline-offset: 10px;">Final Score</h1>
        <div id="final-score-val" style="font-size: 48px; font-weight: bold; margin: 20px 0;">0%</div>
        <button class="btn-menu" onclick="location.reload()">Replay</button>
        <button class="btn-menu" onclick="window.location.href='index.html'">Main Menu</button>
    </div>

    <script>
        let selectedGrade = "";
        let questions = [];
        let currentIdx = 0;
        let score = 0;
        let timer;
        let timeLeft = 10; 
        let isAnswered = false;

        // SYNC SETTINGS FROM INDEX.HTML
        window.onload = () => {
            const savedTime = localStorage.getItem('master_quiz_time');
            if (savedTime) {
                timeLeft = parseInt(savedTime);
            }
        };

        function showScreen(id) {
            const currentActive = document.querySelector('.screen.active');
            const targetScreen = document.getElementById(id);
            if (currentActive) {
                currentActive.classList.remove('active');
                setTimeout(() => {
                    currentActive.style.display = 'none';
                    targetScreen.style.display = 'flex';
                    setTimeout(() => targetScreen.classList.add('active'), 50);
                }, 400);
            } else {
                targetScreen.style.display = 'flex';
                targetScreen.classList.add('active');
            }
        }

        function selectGrade(grade) {
            selectedGrade = grade;
            showScreen('term-screen');
        }

        async function startQuiz(term) {
            try {
                const response = await fetch('edu.json');
                const data = await response.json();
                const qList = (data[selectedGrade] && data[selectedGrade][term]) ? data[selectedGrade][term] : [];
                if (qList.length === 0) {
                    alert("No questions found for " + selectedGrade + " " + term);
                    return;
                }
                questions = qList.sort(() => Math.random() - 0.5);
                currentIdx = 0; score = 0;
                showScreen('quiz-container');
                loadQuestion();
            } catch (e) { alert("Error loading edu.json!"); }
        }

        function loadQuestion() {
            isAnswered = false;
            document.getElementById('main-submit').style.visibility = "visible";
            document.getElementById('feedback').innerText = "";
            const qData = questions[currentIdx];
            document.getElementById('q-idx').innerText = currentIdx + 1;
            document.getElementById('q-text').innerText = qData.q;
            for(let i=0; i<4; i++) {
                const r = document.getElementById(`o${i}`);
                const t = document.getElementById(`t${i}`);
                t.innerText = qData.options[i];
                t.classList.remove('correct-text', 'wrong-text');
                r.checked = false; r.disabled = false;
            }
            startTimer();
        }

        function startTimer() {
            clearInterval(timer);
            // Re-sync time limit at the start of every question
            const savedTime = localStorage.getItem('master_quiz_time');
            let questionTime = savedTime ? parseInt(savedTime) : 10;
            
            let tLeft = questionTime;
            const box = document.getElementById('timer-box');
            box.innerText = `Time: ${tLeft}s`;
            
            timer = setInterval(() => {
                tLeft--;
                box.innerText = `Time: ${tLeft}s`;
                if(tLeft <= 0) {
                    clearInterval(timer);
                    highlightCorrect();
                    moveToNext("Time's Up!", false);
                }
            }, 1000);
        }

        function checkAnswer() {
            if(isAnswered) return;
            let selected = -1;
            for(let i=0; i<4; i++) { if(document.getElementById(`o${i}`).checked) selected = i; }
            if(selected === -1) return;
            clearInterval(timer);
            const correctIdx = questions[currentIdx].correct;
            if(selected === correctIdx) {
                score++;
                document.getElementById(`t${selected}`).classList.add('correct-text');
                moveToNext("Correct! ✅", true);
            } else {
                document.getElementById(`t${selected}`).classList.add('wrong-text');
                highlightCorrect();
                moveToNext("Wrong! ❌", false);
            }
        }

        function highlightCorrect() {
            const correctIdx = questions[currentIdx].correct;
            document.getElementById(`t${correctIdx}`).classList.add('correct-text');
        }

        function moveToNext(msg, isCorrect) {
            isAnswered = true;
            document.getElementById('main-submit').style.visibility = "hidden";
            document.querySelectorAll('input[name="opt"]').forEach(r => r.disabled = true);
            const f = document.getElementById('feedback');
            f.innerText = msg;
            f.style.color = isCorrect ? "green" : "red";
            document.getElementById('live-score').innerText = Math.round((score / (currentIdx + 1)) * 100) + "%";
            setTimeout(() => {
                currentIdx++;
                if(currentIdx < questions.length) loadQuestion();
                else { showScreen('result-screen'); document.getElementById('final-score-val').innerText = Math.round((score / questions.length) * 100) + "%"; }
            }, 2000);
        }

        function handleBack() { if(confirm("Exit Quiz?")) location.reload(); }
    </script>
</body>
</html>
